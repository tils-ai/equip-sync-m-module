name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install poppler via MSYS2
        id: poppler
        shell: pwsh
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-poppler
          $popplerBin = "C:\msys64\mingw64\bin"
          if (-not (Test-Path "$popplerBin\pdftoppm.exe")) {
            Write-Error "pdftoppm.exe not found in $popplerBin"
            exit 1
          }
          echo "bin=$popplerBin" >> $env:GITHUB_OUTPUT

      - name: Build (PyInstaller — 단일 .exe)
        run: pyinstaller --noconfirm --onefile --windowed --hidden-import=win32print --hidden-import=win32ui --hidden-import=win32api --collect-data customtkinter --collect-submodules watcher --collect-submodules gui --collect-submodules agent --add-data "watcher/assets/fonts;assets/fonts" --add-data "${{ steps.poppler.outputs.bin }};poppler" --name equip-sync-m main.py

      - name: Rename artifact (버전 포함)
        shell: pwsh
        run: |
          $name = "equip-sync-m-${{ github.ref_name }}.exe"
          Rename-Item -Path "dist/equip-sync-m.exe" -NewName $name
          echo "ARTIFACT=dist/$name" >> $env:GITHUB_ENV

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
